<!DOCTYPE html>
<!-- Coding By CodingNepal - www.codingnepalweb.com -->
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts Link For Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0"
    />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="script.js" defer></script>
  </head>
  <body class="bg-black">
    <div class="flex items-center justify-center">
      <div class="bg-zinc-200 w-[40%] rounded-xl mt-100px">
        <button
          class="chatbot-toggler flex justify-between w-full p-3 bg-zinc-400 rounded-xl"
        >
          <span class="material-symbols-rounded">mode_comment</span>
          <span class="material-symbols-outlined">close</span>
        </button>
        <div class="chatbot p-3 flex flex-col gap-4">
          <header class="flex justify-between">
            <h1>ShopBot <span>💬</span></h1>
            <span class="material-symbols-outlined">smart_toy</span>
          </header>
          <br />
          <div class="flex flex-col ml-[29%]">
            <ul class="chatbox">
              <li class="chat incoming">
                <p>Hi there <br />How can I help you today?</p>
              </li>
            </ul>
            <div class="chat-input">
              <textarea
                placeholder="Enter a message..."
                spellcheck="false"
                resize="none"
                required
              ></textarea>
              <span id="send-btn" class="material-symbols-rounded">send</span>
            </div>
          </div>
        </div>
      </div>
    </div>

     
  </body>
</html>
